version: 1

items:
  - name: repo-overview
    type: skill
    path: content/skills/repo-overview
    description: "Generate a structured mental model of an unfamiliar codebase — architecture, entry points, data flow, conventions"
    agents: [claude, codex, gemini, cursor]
    tags: [codebase-understanding, onboarding]

  - name: trace-flow
    type: skill
    path: content/skills/trace-flow
    description: "Trace a feature or operation through the codebase end-to-end with file paths and data shapes"
    agents: [claude, codex, gemini, cursor]
    tags: [codebase-understanding, debugging]

  - name: extract-concepts
    type: skill
    path: content/skills/extract-concepts
    description: "Extract domain vocabulary, design patterns, abstractions, and implicit rules from a codebase"
    agents: [claude, codex, gemini, cursor]
    tags: [codebase-understanding, onboarding]

  - name: explore-guide
    type: skill
    path: content/skills/explore-guide
    description: "Guide for using repo-overview, extract-concepts, and trace-flow together — workflow, depth strategy, and anti-patterns"
    agents: [claude, codex, gemini, cursor]
    tags: [codebase-understanding, onboarding, guide]

  - name: dev-setup
    type: skill
    path: content/skills/dev-setup
    description: "Identify everything needed to build, run, and develop locally — env vars, services, bootstrap steps"
    agents: [claude, codex, gemini, cursor]
    tags: [codebase-understanding, onboarding, setup]

  - name: dep-landscape
    type: skill
    path: content/skills/dep-landscape
    description: "Map external dependencies — what they do, which are critical, version health, upgrade pressure"
    agents: [claude, codex, gemini, cursor]
    tags: [codebase-understanding, dependencies, health]

  - name: test-strategy
    type: skill
    path: content/skills/test-strategy
    description: "Map how testing is done — frameworks, patterns, coverage distribution, write-your-first-test template"
    agents: [claude, codex, gemini, cursor]
    tags: [codebase-understanding, testing, onboarding]

  - name: api-surface
    type: skill
    path: content/skills/api-surface
    description: "Inventory everything this project exposes — endpoints, CLI commands, library exports, event contracts"
    agents: [claude, codex, gemini, cursor]
    tags: [codebase-understanding, api, contracts]
